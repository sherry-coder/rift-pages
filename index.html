<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift: Reality Shifting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e8e6f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .moon { font-size: 64px; margin-bottom: 24px; }

        .links a { color: #b8b0d0; text-decoration: none; font-size: 15px; padding: 12px 32px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; transition: all 0.2s; width: 240px; }

        .footer { margin-top: 80px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #555; }

</head>

    <div class="container">
